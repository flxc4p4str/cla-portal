<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="cla-portal logo mark">
  <style>
    .brand-start { stop-color: #fb7185; }
    .brand-end { stop-color: #7f1d1d; }
    .bar-primary { fill: #fff7f8; }
    .bar-secondary { fill: #fecdd6; }
    .bar-tertiary { fill: #fda4af; }

    @media (prefers-color-scheme: dark) {
      .brand-start { stop-color: #fda4af; }
      .brand-end { stop-color: #2c1116; }
      .bar-primary { fill: #fff1f2; }
      .bar-secondary { fill: #ffe4e8; }
      .bar-tertiary { fill: #fecdd6; }
    }
  </style>
  <defs>
    <linearGradient id="brand" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop class="brand-start" offset="0" />
      <stop class="brand-end" offset="1" />
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="48" height="48" rx="10" fill="url(#brand)" />
  <rect class="bar-primary" x="19" y="18" width="6" height="28" rx="3" />
  <rect class="bar-secondary" x="29" y="24" width="6" height="22" rx="3" />
  <rect class="bar-tertiary" x="39" y="30" width="6" height="16" rx="3" />
</svg>
