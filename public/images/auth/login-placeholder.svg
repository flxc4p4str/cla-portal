<svg width="920" height="560" viewBox="0 0 920 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Application dashboard placeholder">
  <style>
    .panel-start { stop-color: #fff7f8; }
    .panel-end { stop-color: #ffe4e8; }
    .chart-start { stop-color: #fb7185; }
    .chart-end { stop-color: #b91c1c; }
    .canvas { fill: #3f0d16; }
    .shell { fill: url(#panel); }
    .toolbar { fill: #c08497; }
    .badge { fill: #fecdd6; }
    .card { fill: #ffffff; }
    .chart-point { fill: #ef4444; }
    .copy-strong { fill: #d4a4af; }
    .copy-soft { fill: #f5d3da; }

    @media (prefers-color-scheme: dark) {
      .panel-start { stop-color: #39151b; }
      .panel-end { stop-color: #2c1116; }
      .chart-start { stop-color: #fda4af; }
      .chart-end { stop-color: #ef4444; }
      .canvas { fill: #120609; }
      .toolbar { fill: #a33849; }
      .badge { fill: #6f2632; }
      .card { fill: #35151b; }
      .chart-point { fill: #fb7185; }
      .copy-strong { fill: #8f4a57; }
      .copy-soft { fill: #6f2632; }
    }
  </style>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop class="panel-start" offset="0" />
      <stop class="panel-end" offset="1" />
    </linearGradient>
    <linearGradient id="chart" x1="1" y1="0" x2="0" y2="1">
      <stop class="chart-start" offset="0" />
      <stop class="chart-end" offset="1" />
    </linearGradient>
  </defs>

  <rect class="canvas" width="920" height="560" />
  <rect class="shell" x="20" y="20" width="880" height="520" rx="12" />

  <rect class="toolbar" x="48" y="48" width="200" height="18" rx="8" />
  <rect class="badge" x="700" y="46" width="170" height="22" rx="8" />

  <rect class="card" x="48" y="94" width="176" height="112" rx="10" />
  <rect class="card" x="238" y="94" width="176" height="112" rx="10" />
  <rect class="card" x="428" y="94" width="176" height="112" rx="10" />
  <rect class="card" x="618" y="94" width="252" height="112" rx="10" />

  <rect class="card" x="48" y="232" width="548" height="280" rx="12" />
  <rect class="card" x="618" y="232" width="252" height="136" rx="12" />
  <rect class="card" x="618" y="376" width="252" height="136" rx="12" />

  <path d="M78 442 L180 390 L278 410 L370 336 L478 362 L566 286" stroke="url(#chart)" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round" />
  <circle class="chart-point" cx="180" cy="390" r="8" />
  <circle class="chart-point" cx="370" cy="336" r="8" />
  <circle class="chart-point" cx="566" cy="286" r="8" />

  <rect class="copy-strong" x="650" y="262" width="188" height="12" rx="6" />
  <rect class="copy-soft" x="650" y="288" width="140" height="10" rx="5" />
  <rect class="copy-soft" x="650" y="314" width="170" height="10" rx="5" />

  <rect class="copy-strong" x="650" y="406" width="188" height="12" rx="6" />
  <rect class="copy-soft" x="650" y="432" width="132" height="10" rx="5" />
  <rect class="copy-soft" x="650" y="458" width="168" height="10" rx="5" />
</svg>
